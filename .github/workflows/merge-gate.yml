name: Merge Gate

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: merge-gate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  repo-hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for iCloud sync conflicts
        run: |
          if find . -path ./node_modules -prune -o -path ./.git -prune -o -name "* [0-9]*" -print | grep -q .; then
            echo "::error::iCloud sync conflicts detected"
            find . -path ./node_modules -prune -o -path ./.git -prune -o -name "* [0-9]*" -print
            exit 1
          fi

  node-quality:
    name: Node Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm dlx @biomejs/biome check .
      - name: Type check
        run: pnpm exec svelte-check --fail-on-warnings
      - name: Unit tests with coverage
        run: pnpm vitest run --coverage
      - name: Build
        run: pnpm build

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.29.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: CodeQL Security
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  required-checks:
    name: Required Checks (Merge)
    runs-on: ubuntu-latest
    needs:
      - repo-hygiene
      - node-quality
      - dependency-scan
      - secret-scanning
      - codeql
    if: always()
    steps:
      - name: Verify all merge gate jobs passed
        run: |
          if [ "${{ needs.repo-hygiene.result }}" != "success" ] || \
             [ "${{ needs.node-quality.result }}" != "success" ] || \
             [ "${{ needs.dependency-scan.result }}" != "success" ] || \
             [ "${{ needs.secret-scanning.result }}" != "success" ] || \
             [ "${{ needs.codeql.result }}" != "success" ]; then
            echo "One or more merge gate jobs failed."
            echo "repo-hygiene: ${{ needs.repo-hygiene.result }}"
            echo "node-quality: ${{ needs.node-quality.result }}"
            echo "dependency-scan: ${{ needs.dependency-scan.result }}"
            echo "secret-scanning: ${{ needs.secret-scanning.result }}"
            echo "codeql: ${{ needs.codeql.result }}"
            exit 1
          fi
          echo "All merge gate jobs passed."
      - name: Cleanup pnpm store
        if: always()
        run: rm -rf "/tmp/pnpm-store-${GITHUB_RUN_ID}"

name: PR Gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check for iCloud sync conflicts
        run: |
          if find . -path ./node_modules -prune -o -path ./.git -prune -o -name "* [0-9]*" -print | grep -q .; then
            echo "::error::iCloud sync conflicts detected"
            find . -path ./node_modules -prune -o -path ./.git -prune -o -name "* [0-9]*" -print
            exit 1
          fi

  node-quality:
    name: Node Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm dlx @biomejs/biome check .
      - name: Generate SvelteKit types
        run: pnpm svelte-kit sync
      - name: Type check
        run: pnpm exec svelte-check --fail-on-warnings
      - name: Unit tests with coverage
        run: pnpm vitest run --coverage
      - name: Build
        run: pnpm build

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  structure:
    name: Repository Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build structurelint
        run: |
          git clone --depth 1 --branch v1.0.2 https://github.com/Jonathangadeaharder/structurelint.git /tmp/structurelint
          cd /tmp/structurelint && go build -o /tmp/structurelint-bin ./cmd/structurelint
      - name: Run structurelint
        run: /tmp/structurelint-bin .
      - name: Cleanup structurelint build
        if: always()
        run: rm -rf /tmp/structurelint /tmp/structurelint-bin

  vitest-lint:
    name: Test Quality (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install and run vitest-linter
        run: |
          git clone --depth 1 --branch v1.0.0 https://github.com/VidiomTM/vitest-linter.git /tmp/vitest-linter
          cd /tmp/vitest-linter && cargo build --release -q
          cp /tmp/vitest-linter/target/release/vitest-linter /usr/local/bin/
          cd $GITHUB_WORKSPACE
          vitest-linter . --format terminal
      - name: Cleanup vitest-linter
        if: always()
        run: rm -rf /tmp/vitest-linter

  required-checks:
    name: Required Checks (PR)
    runs-on: ubuntu-latest
    needs:
      - repo-hygiene
      - node-quality
      - dependency-scan
      - secret-scanning
      - structure
      - vitest-lint
    if: always()
    steps:
      - name: Verify all PR gate jobs passed
        run: |
          if [ "${{ needs.repo-hygiene.result }}" != "success" ] || \
             [ "${{ needs.node-quality.result }}" != "success" ] || \
             [ "${{ needs.dependency-scan.result }}" != "success" ] || \
             [ "${{ needs.secret-scanning.result }}" != "success" ] || \
             [ "${{ needs.structure.result }}" != "success" ] || \
             [ "${{ needs.vitest-lint.result }}" != "success" ]; then
            echo "One or more PR gate jobs failed."
            echo "repo-hygiene: ${{ needs.repo-hygiene.result }}"
            echo "node-quality: ${{ needs.node-quality.result }}"
            echo "dependency-scan: ${{ needs.dependency-scan.result }}"
            echo "secret-scanning: ${{ needs.secret-scanning.result }}"
            exit 1
          fi
          echo "All PR gate jobs passed."
      - name: Cleanup pnpm store
        if: always()
        run: rm -rf "/tmp/pnpm-store-${GITHUB_RUN_ID}"
